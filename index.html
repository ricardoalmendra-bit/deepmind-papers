async function callGemini(prompt) {
  if (!apiKey) { document.getElementById('modal').classList.add('open'); return null; }
  const isAIza = apiKey.startsWith('AIza');
  const url = isAIza
    ? `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`
    : `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent`;
  const headers = isAIza
    ? { 'Content-Type': 'application/json' }
    : { 'Content-Type': 'application/json', 'x-goog-api-key': apiKey };
  const res = await fetch(url, {
    method: 'POST', headers,
    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
  });
  const data = await res.json();
  if (data.candidates && data.candidates[0])
    return data.candidates[0].content.parts[0].text;
  return null;
}

async function findArxivPdf(title) {
  // Search arxiv for the paper by title
  try {
    const query = encodeURIComponent(title.replace(/[^a-zA-Z0-9 ]/g, ' ').trim());
    const arxivUrl = `https://export.arxiv.org/api/query?search_query=ti:${query}&max_results=1`;
    const res = await fetch(arxivUrl);
    const xml = await res.text();
    const parser = new DOMParser();
    const doc = parser.parseFromString(xml, 'text/xml');
    const entry = doc.querySelector('entry');
    if (!entry) return null;
    const links = entry.querySelectorAll('link');
    for (const link of links) {
      if (link.getAttribute('type') === 'application/pdf') {
        return link.getAttribute('href');
      }
    }
    // Try to build PDF url from id
    const idEl = entry.querySelector('id');
    if (idEl) {
      const arxivId = idEl.textContent.split('/abs/')[1];
      if (arxivId) return `https://arxiv.org/pdf/${arxivId}`;
    }
  } catch(e) {}
  return null;
}

}

// Google Cloud TTS Neural
async function speakNeural(text, lang, barId, btnEl, btnLabel) {
  stopSpeech();
  const keyToUse = ttsKey || apiKey;
  if (!keyToUse) { document.getElementById('modal').classList.add('open'); return; }
  
  const bar = document.getElementById(barId);
  if (bar) { bar.classList.add('visible'); bar.querySelector('.tts-label').textContent = 'A sintetizar voz neural...'; }

  const voice = lang === 'pt-PT'
    ? { languageCode: 'pt-PT', name: 'pt-PT-Wavenet-E' }
    : { languageCode: 'en-US', name: 'en-US-Chirp3-HD-Aoede' };

  // Split text into chunks of max 4500 chars (API limit is 5000)
  const chunks = [];
  let remaining = text;
  while (remaining.length > 0) {
    if (remaining.length <= 4500) { chunks.push(remaining); break; }
    let cut = remaining.lastIndexOf('. ', 4500);
    if (cut === -1) cut = 4500;
    chunks.push(remaining.substring(0, cut + 1));
    remaining = remaining.substring(cut + 1).trim();
  }

  const audioQueue = [];
  let playing = false;
  let stopped = false;
  let processed = 0;

  async function fetchChunk(chunk) {
    const res = await fetch(`https://texttospeech.googleapis.com/v1/text:synthesize?key=${ttsKey || apiKey}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        input: { text: chunk },
        voice: voice,
        audioConfig: { audioEncoding: 'MP3', speakingRate: 0.95, pitch: 0 }
      })
    });
    const data = await res.json();
    if (data.audioContent) return data.audioContent;
    throw new Error(data.error?.message || 'TTS error');
  }

  async function playQueue() {
    if (stopped || audioQueue.length === 0) return;
    playing = true;
    const b64 = audioQueue.shift();
    const audio = new Audio('data:audio/mp3;base64,' + b64);
    currentAudio = audio;
    const fill = bar ? bar.querySelector('.progress-fill') : null;
    const lbl = bar ? bar.querySelector('.tts-label') : null;
    const pct = Math.round((processed / chunks.length) * 100);
    if (fill) fill.style.width = pct + '%';
    if (lbl) lbl.textContent = (lang === 'pt-PT' ? '🎧 PT' : '🇬🇧 EN') + ' — ' + pct + '%';
    processed++;
    isPaused = false;
  audio.onended = () => { playing = false; isPaused = false; playQueue(); };
    audio.onerror = () => { playing = false; playQueue(); };
    await audio.play();
  }

  // Fetch all chunks and play progressively
  for (let i = 0; i < chunks.length; i++) {
    if (stopped) break;
    try {
      const b64 = await fetchChunk(chunks[i]);
      audioQueue.push(b64);
      if (!playing) playQueue();
    } catch(e) {
      console.error('TTS chunk error:', e);
      // Fallback to browser TTS for this chunk
      const utter = new SpeechSynthesisUtterance(chunks[i]);
      utter.lang = lang; utter.rate = 0.92;
      if (lang === 'pt-PT' && ptVoice) utter.voice = ptVoice;
      speechSynthesis.speak(utter);
    }
  }

  window._ttsStop = () => { stopped = true; if(currentAudio) { currentAudio.pause(); currentAudio = null; } };
  if (bar) { const fill = bar.querySelector('.progress-fill'); if(fill) fill.style.width = '100%'; }
  setTimeout(() => { if(bar && !playing) bar.classList.remove('visible'); }, 1000);
}

let currentAudio = null;
let isPaused = false;

function togglePause(btn) {
  if (!currentAudio) return;
  if (isPaused) {
    currentAudio.play();
    isPaused = false;
    btn.textContent = '⏸ Pausa';
  } else {
    currentAudio.pause();
    isPaused = true;
    btn.textContent = '▶ Retomar';
  }
}

function speak(text, label, barId) {
  speakNeural(text, 'pt-PT', barId, null, label);
}

function stopSpeech() {
  speechSynthesis.cancel();
  currentUtterance = null;
  isPaused = false;
  if (window._ttsStop) { window._ttsStop(); window._ttsStop = null; }
  if (currentAudio) { currentAudio.pause(); currentAudio = null; }
  document.querySelectorAll('.tts-bar').forEach(b => b.classList.remove('visible'));
  document.querySelectorAll('.btn-listen, .btn-listen-full, .btn-listen-en').forEach(b => {
    if (b.textContent.includes('Parar') || b.textContent.includes('...')) {
      if (b.classList.contains('btn-listen-full')) b.textContent = '🎧 Ouvir PT';
      else if (b.classList.contains('btn-listen-en')) b.textContent = '🇬🇧 Ouvir EN';
      else b.textContent = '🔊 Ouvir resumo';
    }
  });
}

      <div class="card-date">${p.label}</div>
      <div class="card-title">${p.title}</div>
      <div class="card-actions">
        <button class="btn btn-summary" onclick="toggleSummary('${p.id}','${safeTitle}',this)">💡 Resumo</button>
        <button class="btn btn-listen" id="listen-${p.id}" onclick="listenSummary('${p.id}','${safeTitle}',this)">🔊 Ouvir resumo</button>
        <button class="btn btn-listen-full" id="listen-full-${p.id}" onclick="listenFull('${p.id}','${safeTitle}',this)">🎧 Ouvir PT</button>
        <button class="btn btn-listen-en" id="listen-en-${p.id}" onclick="listenFullEn('${p.id}','${safeTitle}',this)">🇬🇧 Ouvir EN</button>
        <button class="btn btn-read" onclick="window.open('https://deepmind.google/research/publications/${p.id}/','_blank')">🔗 Artigo</button>
        <button class="btn btn-studied ${isStudied ? 'done' : ''}" onclick="toggleStudied('${p.id}',this)">${isStudied ? '✅ Estudado' : '📌 Marcar'}</button>
      </div>
      <div class="summary-box" id="summary-${p.id}"></div>
      <div class="full-box" id="full-${p.id}"></div>
      <div class="tts-bar" id="tts-${p.id}">
        <span class="tts-label">A reproduzir...</span>
        <div class="progress-bar"><div class="progress-fill"></div></div>
        <button onclick="togglePause(this)">⏸ Pausa</button>
        <button onclick="stopSpeech()">⏹ Parar</button>
      </div>
    `;
    list.appendChild(card);
    if (summaries[p.id]) {
      const box = document.getElementById('summary-' + p.id);
      box.textContent = summaries[p.id];
      box.classList.add('visible');
    }
  });
  updateStats();
}

async function toggleSummary(id, title, btn) {
  const box = document.getElementById('summary-' + id);
  if (box.classList.contains('visible') && box.textContent && !box.textContent.includes('gerar')) {
    box.classList.remove('visible'); return;
  }
  box.classList.add('visible');
  box.innerHTML = '<span class="summary-loading">A gerar resumo...</span>';
  btn.disabled = true;
  const text = await getSummary(id, title);
  btn.disabled = false;
  if (text) box.textContent = text;
}

async function listenSummary(id, title, btn) {
  if (speechSynthesis.speaking) { stopSpeech(); return; }
  let text = summaries[id];
  if (!text) {
    btn.textContent = '⏳...'; btn.disabled = true;
    text = await getSummary(id, title);
    btn.disabled = false;
    if (!text) return;
    const box = document.getElementById('summary-' + id);
    box.textContent = text; box.classList.add('visible');
  }
  speak(text, 'Resumo', 'tts-' + id);
}

async function listenFull(id, title, btn) {
  if (speechSynthesis.speaking) { stopSpeech(); return; }
  btn.textContent = '⏳ A preparar...'; btn.disabled = true;
  let text = fullTexts[id];
  if (!text) text = await getFullText(id, title);
  btn.disabled = false;
  btn.textContent = '🎧 Ouvir PT';
  if (!text) return;
  const box = document.getElementById('full-' + id);
  box.textContent = text; box.classList.add('visible');
  speak(text, 'Artigo completo', 'tts-' + id);
}

async function listenFullEn(id, title, btn) {
  if (speechSynthesis.speaking) { stopSpeech(); return; }
  btn.textContent = '⏳ A preparar...'; btn.disabled = true;
  let text = fullTextsEn[id];
  if (!text) text = await getFullTextEn(id, title);
  btn.disabled = false;
  btn.textContent = '🇬🇧 Ouvir EN';
  if (!text) return;
  const box = document.getElementById('full-' + id);
  box.textContent = text; box.classList.add('visible');
  speakNeural(text, 'en-US', 'tts-' + id, btn, 'Artigo EN');
}

function toggleStudied(id, btn) {
  studied[id] = !studied[id];
  localStorage.setItem('studied', JSON.stringify(studied));
  btn.textContent = studied[id] ? '✅ Estudado' : '📌 Marcar';
  btn.className = 'btn btn-studied' + (studied[id] ? ' done' : '');
  document.getElementById('card-' + id).className = 'card' + (studied[id] ? ' studied' : '');
  updateStats();
}

if (apiKey) document.getElementById('apiKey').placeholder = 'Gemini: Chave guardada ✓';
if (ttsKey) document.getElementById('ttsKey').placeholder = 'TTS: Chave guardada ✓';
renderCards();
</script>
</body>
</html>
